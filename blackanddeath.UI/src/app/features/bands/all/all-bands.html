<div class="all-bands">

  <div class="all-bands__header">
    <h1 class="all-bands__title">Bands</h1>
    <div class="all-bands__filter">
      <label class="all-bands__filter-label" for="bands-sort">Sort by</label>
      <select class="all-bands__filter-select" id="bands-sort"
        [value]="activeSort()"
        (change)="onSortChange($any($event.target).value)">
        @for (option of sortOptions; track option) {
          <option [value]="option">{{ option }}</option>
        }
      </select>
    </div>
  </div>

  <div class="all-bands__grid">
    @for (band of bands(); track band.id) {
      <app-band-card [bandCard]="band" />
    }
  </div>

  @if (total() > pageSize) {
    <app-pagination
      [total]="total()"
      [pageSize]="pageSize"
      [currentPage]="currentPage()"
      (pageChange)="onPageChange($event)"
    />
  }

</div>
