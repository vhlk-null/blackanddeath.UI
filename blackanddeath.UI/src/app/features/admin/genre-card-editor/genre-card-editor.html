<div class="card-editor">
  <div class="card-editor__header">
    <label class="card-editor__cover-btn" title="Upload cover">
      @if (previewUrl()) {
        <img class="card-editor__cover-img" [src]="previewUrl()!" [alt]="card().name" />
      } @else {
        <svg class="card-editor__icon" viewBox="0 0 171 171" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="85.5" cy="85.5" r="14.5" fill="#606162"/>
          <path d="M85.5 0C132.72 0 171 38.2797 171 85.5C171 132.72 132.72 171 85.5 171C38.2797 171 0 132.72 0 85.5C0 38.2797 38.2797 0 85.5 0ZM119.71 133.576C113.843 137.859 107.126 141.048 99.8604 142.844L103.436 158.445C113.333 156.04 122.441 151.617 130.3 145.637L119.71 133.576ZM133.942 118.561C132.431 120.882 130.755 123.087 128.932 125.158L140.891 135.788C143.416 132.926 145.72 129.865 147.777 126.631L133.942 118.561ZM85.5 50.5C66.17 50.5 50.5 66.17 50.5 85.5C50.5 104.83 66.17 120.5 85.5 120.5C104.83 120.5 120.5 104.83 120.5 85.5C120.5 66.17 104.83 50.5 85.5 50.5ZM30.7461 37.2188C28.2207 40.0805 25.9164 43.1419 23.8594 46.376L37.6943 54.4463C39.2056 52.1246 40.8813 49.9199 42.7051 47.8486L30.7461 37.2188ZM68.2012 14.5615C58.3037 16.9667 49.1959 21.3902 41.3369 27.3701L51.9268 39.4307C57.7939 35.1476 64.5108 31.959 71.7764 30.1631L68.2012 14.5615Z" fill="#606162"/>
        </svg>
      }
      <input type="file" accept="image/*" (change)="onFileChange($event)" hidden />
    </label>
    <p class="card-editor__name">{{ card().name }}</p>
  </div>

  <form class="card-editor__form" [formGroup]="form">
    <div class="card-editor__field">
      <label class="card-editor__label">Genres</label>
      <app-multi-select
        formControlName="genreIds"
        [options]="genreOptions()"
        placeholder="Search genres..."
      />
    </div>
    <div class="card-editor__field">
      <label class="card-editor__label">Tags</label>
      <app-multi-select
        formControlName="tagIds"
        [options]="tagOptions()"
        placeholder="Search tags..."
      />
    </div>
  </form>

  <div class="card-editor__actions">
    <button class="card-editor__delete" (click)="onDelete()" [disabled]="deleting() || saving()">
      {{ deleting() ? 'Deleting...' : 'Delete' }}
    </button>
    <button class="card-editor__save" (click)="onSave()" [disabled]="saving() || deleting()">
      {{ saving() ? 'Saving...' : 'Save' }}
    </button>
  </div>
</div>
