<div class="approve-data">
  <div class="approve-data__tabs">
    <app-tabs [tabs]="tabs" (tabChange)="onTabChange($event)" />
  </div>

  @if (loading()) {
    <p class="approve-data__empty">Loading...</p>
  } @else if (items().length === 0) {
    <p class="approve-data__empty">No pending items.</p>
  } @else {
    <table class="approve-data__table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          @if (activeTab() !== 'Videos') {
            <th>Slug</th>
          }
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (item of items(); track item.id) {
          <tr
            [class.approve-data__row--clickable]="activeTab() !== 'Videos'"
            (click)="navigateToEdit(item)"
          >
            <td class="approve-data__id">{{ item.id }}</td>
            <td>{{ item.name }}</td>
            @if (activeTab() !== 'Videos') {
              <td class="approve-data__slug">{{ item.slug ?? '—' }}</td>
            }
            <td class="approve-data__actions" (click)="$event.stopPropagation()">
              <button class="approve-data__action-btn approve-data__action-btn--delete" title="Delete" (click)="delete(item)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
