<div class="genre-detail">

  <div class="genre-detail__header">
    <h1 class="genre-detail__title">{{ cardName() }}</h1>
  </div>

  <div class="genre-detail__grid">
    @for (album of albums(); track album.id) {
      <app-album-card [albumCard]="album" />
    }
  </div>

  @if (total() > pageSize) {
    <app-pagination
      [total]="total()"
      [pageSize]="pageSize"
      [currentPage]="currentPage()"
      (pageChange)="onPageChange($event)"
    />
  }

</div>
