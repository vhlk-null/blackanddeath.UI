<app-section [sectionTitle]="titles.topRated" [tabs]="tabs.topRated" (tabChange)="tabIndex.topRated.set($event)">
  @for (album of mainTopRatedAlbums(); track album.id) {
  <app-album-card [albumCard]="album" />
  }
</app-section>
