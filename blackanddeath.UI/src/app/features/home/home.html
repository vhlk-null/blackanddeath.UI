<app-section sectionTitle="Top Rated" [tabs]="tabs.topRated" (tabChange)="tabIndex.topRated.set($event)">
  @for (album of mainTopRatedAlbums(); track album.id) {
  <app-album-card [albumCard]="album" />
  }
</app-section>

<app-section sectionTitle="Popular Bands" [tabs]="tabs.popularBands" (tabChange)="tabIndex.popularBands.set($event)">
  @for (band of mainPopularBands(); track band.id) {
  <app-band-card [bandCard]="band" />
  }
</app-section>
