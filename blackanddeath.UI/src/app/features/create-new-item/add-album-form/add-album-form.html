<div class="add-album">

  <app-section style="--section-grid-columns: 1fr">
    <div class="add-album__preview">
      @if (previewUrl) {
        <img [src]="previewUrl" alt="Album cover preview" class="add-album__preview-img" />
      } @else {
        <div class="add-album__preview-empty">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
      }
    </div>
  </app-section>

  <app-section sectionTitle="Add Form" class="add-album__form-section">
    <div class="add-album__content">
    <p class="add-album__note">Moderation can take 3 to 5 days!</p>

    <form class="add-album__form" (submit)="$event.preventDefault()">

      <div class="add-album__row">
        <label class="add-album__label">Album cover:</label>
        <label class="add-album__file-btn">
          Upload image
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          <input type="file" accept="image/*" (change)="onFileChange($event)" hidden />
        </label>
      </div>

      <div class="add-album__row">
        <label class="add-album__label" for="album-name">Album name:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-name" type="text" placeholder="Album name" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="add-album__row">
        <label class="add-album__label" for="album-band">Band name:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-band" type="text" placeholder="Band name" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="add-album__row">
        <label class="add-album__label" for="album-year">Year:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-year" type="number" placeholder="Year" min="1900" max="2099" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="add-album__row">
        <label class="add-album__label" for="album-country">Country:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-country" type="text" placeholder="Country" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="add-album__row">
        <label class="add-album__label" for="album-genre">Genre:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-genre" type="text" placeholder="Genre" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="add-album__row">
        <label class="add-album__label" for="album-label">Label:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-label" type="text" placeholder="Record label" />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="add-album__row">
        <label class="add-album__label" for="album-type">Type:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-type" type="text" placeholder="Full-length, EP..." />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
      </div>

      <div class="add-album__row add-album__row--textarea">
        <label class="add-album__label" for="album-styles">Styles:</label>
        <textarea class="add-album__textarea" id="album-styles" placeholder="Type here..."></textarea>
      </div>

      <div class="add-album__row">
        <label class="add-album__label" for="album-spotify">Spotify:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-spotify" type="url" placeholder="type here.." />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="add-album__row">
        <label class="add-album__label" for="album-apple">Apple Music:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-apple" type="url" placeholder="type here.." />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="add-album__row">
        <label class="add-album__label" for="album-youtube">Youtube:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-youtube" type="url" placeholder="type here.." />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="add-album__row">
        <label class="add-album__label" for="album-bandcamp">Bandcamp:</label>
        <div class="add-album__input-wrap">
          <input class="add-album__input" id="album-bandcamp" type="url" placeholder="type here.." />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <div class="add-album__actions">
        <button class="add-album__btn add-album__btn--cancel" type="button">Cancel</button>
        <button class="add-album__btn add-album__btn--publish" type="submit">Publish</button>
      </div>

    </form>
    </div>
  </app-section>

</div>
