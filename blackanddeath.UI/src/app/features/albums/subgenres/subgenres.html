<app-section [sectionTitle]="titles.classicDeath" [tabs]="tabs.subgenre" (tabChange)="onClassicDeathTabChange($event)">
  @for (album of classicDeathAlbums(); track album.id) {
    <app-album-card [albumCard]="album" />
  }
</app-section>
