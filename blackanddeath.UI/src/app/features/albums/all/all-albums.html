<div class="all-albums">

  <div class="all-albums__header">
    <h1 class="all-albums__title">Albums</h1>
    <div class="all-albums__filter">
      <label class="all-albums__filter-label" for="albums-sort">Sort by</label>
      <select class="all-albums__filter-select" id="albums-sort"
        [value]="activeSort()"
        (change)="onSortChange($any($event.target).value)">
        @for (option of sortOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>
  </div>

  @if (loaded() && albums().length === 0) {
    <p class="all-albums__empty">No albums found.</p>
  } @else {
    <div class="all-albums__grid">
      @for (album of albums(); track album.id) {
        <app-album-card [albumCard]="album" />
      }
    </div>
  }

  @if (total() > pageSize) {
    <app-pagination
      [total]="total()"
      [pageSize]="pageSize"
      [currentPage]="currentPage()"
      (pageChange)="onPageChange($event)"
    />
  }

</div>
