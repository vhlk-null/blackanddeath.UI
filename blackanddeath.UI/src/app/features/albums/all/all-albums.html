<div class="all-albums">

  <div class="all-albums__header">
    <h1 class="all-albums__title">Albums</h1>
    <div class="all-albums__filter">
      <label class="all-albums__filter-label" for="albums-sort">Sort by</label>
      <select class="all-albums__filter-select" id="albums-sort"
        [value]="activeTab()"
        (change)="onTabChange(+$any($event.target).value)">
        @for (tab of tabs; track $index) {
          <option [value]="$index">{{ tab }}</option>
        }
      </select>
    </div>
  </div>

  <div class="all-albums__grid">
    @for (album of albums(); track album.id) {
      <app-album-card [albumCard]="album" />
    }
  </div>

  @if (total() > pageSize) {
    <app-pagination
      [total]="total()"
      [pageSize]="pageSize"
      [currentPage]="currentPage()"
      (pageChange)="onPageChange($event)"
    />
  }

</div>
