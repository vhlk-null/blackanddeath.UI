<header class="header">
  <div class="header__inner">

    <div class="header__left">
      <button class="header__menu-btn" (click)="menuOpen.set(true)" aria-label="Open menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="14" viewBox="0 0 18 14" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="0" y1="1" x2="18" y2="1" />
          <line x1="0" y1="7" x2="18" y2="7" />
          <line x1="0" y1="13" x2="18" y2="13" />
        </svg>
      </button>
      <a class="header__logo" href="/">Blackened Death Metal</a>
    </div>

    <div class="header__center">
      <div class="header__search">
        <input type="text" placeholder="Search here..." aria-label="Search" />
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </div>
    </div>

    <div class="header__right">
      <button class="header__theme-btn" (click)="theme.cycle()" aria-label="Switch theme">
        @switch (theme.theme()) {
          @case ('dark') {
          <!-- Sun icon — next: light -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <line x1="12" y1="2" x2="12" y2="4" />
            <line x1="12" y1="20" x2="12" y2="22" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="2" y1="12" x2="4" y2="12" />
            <line x1="20" y1="12" x2="22" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          }
          @case ('light') {
          <!-- Heart icon — next: pink -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
          }
          @case ('pink') {
          <!-- Moon icon — next: dark -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
          </svg>
          }
        }
      </button>
      <button class="header__user-btn" (click)="loginOpen.set(true)" aria-label="User profile">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
      </button>
    </div>

  </div>

  @if (menuOpen()) {
  <div class="nav-overlay" (click)="menuOpen.set(false)"></div>
  <nav class="nav-drawer">
    <button class="nav-drawer__close" (click)="menuOpen.set(false)" aria-label="Close menu">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <ul class="nav-drawer__links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen.set(false)">Home</a></li>
      <li>
        <a routerLink="/albums" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen.set(false)">Albums</a>
        <!-- <ul class="nav-drawer__sub">
          <li><a routerLink="/albums/subgenres" routerLinkActive="active" (click)="menuOpen.set(false)">Subgenres</a></li>
        </ul> -->
      </li>
      <li>
        <a routerLink="/bands" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen.set(false)">Bands</a>
        <!-- <ul class="nav-drawer__sub">
          <li><a routerLink="/bands/subgenres" routerLinkActive="active" (click)="menuOpen.set(false)">Subgenres</a></li>
        </ul> -->
      </li>
      <li><a routerLink="/genres" routerLinkActive="active" (click)="menuOpen.set(false)">Genres</a></li>
      <li><a routerLink="/create" routerLinkActive="active" (click)="menuOpen.set(false)">Create</a></li>
      <li><a routerLink="/admin" routerLinkActive="active" (click)="menuOpen.set(false)">Admin</a></li>
    </ul>
  </nav>
  }

</header>

@if (loginOpen()) {
<app-login-modal (closed)="loginOpen.set(false)" />
}
