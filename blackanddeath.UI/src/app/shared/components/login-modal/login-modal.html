<div class="login-overlay" (click)="onOverlayClick($event)">
  <div class="login-modal" role="dialog" aria-modal="true"
    [attr.aria-label]="mode() === 'login' ? 'Sign in' : 'Register'">

    <button class="login-modal__close" (click)="close()" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>

    @if (mode() === 'login') {

    <h2 class="login-modal__title">Sign In</h2>
    <p class="login-modal__subtitle">Welcome back to Blackened Death Metal</p>

    <form class="login-modal__form" (submit)="$event.preventDefault()">
      <div class="login-modal__field">
        <label class="login-modal__label" for="login-email">Email</label>
        <input class="login-modal__input" id="login-email" type="email" placeholder="your@email.com"
          autocomplete="email" />
      </div>

      <div class="login-modal__field">
        <label class="login-modal__label" for="login-password">Password</label>
        <input class="login-modal__input" id="login-password" type="password" placeholder="••••••••"
          autocomplete="current-password" />
      </div>

      <div class="login-modal__forgot">
        <a href="#" (click)="$event.preventDefault()">Forgot password?</a>
      </div>

      <button class="login-modal__submit" type="submit">Sign In</button>
    </form>

    <p class="login-modal__switch">
      Don't have an account?
      <button class="login-modal__switch-btn" (click)="mode.set('register')">Register</button>
    </p>

    } @else {

    <h2 class="login-modal__title">Create Account</h2>
    <p class="login-modal__subtitle">Join the Blackened Death Metal community</p>

    <form class="login-modal__form" (submit)="$event.preventDefault()">
      <div class="login-modal__field">
        <label class="login-modal__label" for="reg-username">Username</label>
        <input class="login-modal__input" id="reg-username" type="text" placeholder="your_username"
          autocomplete="username" />
      </div>

      <div class="login-modal__field">
        <label class="login-modal__label" for="reg-email">Email</label>
        <input class="login-modal__input" id="reg-email" type="email" placeholder="your@email.com"
          autocomplete="email" />
      </div>

      <div class="login-modal__field">
        <label class="login-modal__label" for="reg-password">Password</label>
        <input class="login-modal__input" id="reg-password" type="password" placeholder="••••••••"
          autocomplete="new-password" />
      </div>

      <div class="login-modal__field">
        <label class="login-modal__label" for="reg-confirm">Confirm Password</label>
        <input class="login-modal__input" id="reg-confirm" type="password" placeholder="••••••••"
          autocomplete="new-password" />
      </div>

      <button class="login-modal__submit" type="submit">Create Account</button>
    </form>

    <p class="login-modal__switch">
      Already have an account?
      <button class="login-modal__switch-btn" (click)="mode.set('login')">Sign In</button>
    </p>

    }

  </div>
</div>
