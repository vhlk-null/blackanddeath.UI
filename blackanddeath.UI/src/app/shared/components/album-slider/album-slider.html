<div class="slider">
  <button class="slider__btn slider__btn--prev" (click)="scroll('prev')" aria-label="Previous">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="slider__track" #track>
    @for (album of albums(); track album.id) {
      <app-album-card class="slider__item" [albumCard]="album" />
    }
  </div>

  <button class="slider__btn slider__btn--next" (click)="scroll('next')" aria-label="Next">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="9 18 15 12 9 6"></polyline>
    </svg>
  </button>
</div>
