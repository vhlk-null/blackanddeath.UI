<div class="rich-editor" [class.rich-editor--collapsed]="!showToolbar" [class.rich-editor--compact]="compact">
  <div class="rich-editor__toolbar" [class.rich-editor__toolbar--hidden]="!showToolbar">
    <div class="rich-editor__toolbar-group">
      <button type="button" class="rich-editor__tool" [class.rich-editor__tool--active]="isBold()" (click)="toggleBold()" title="Bold">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 4h8a4 4 0 0 1 0 8H6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 12h9a4 4 0 0 1 0 8H6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button type="button" class="rich-editor__tool" [class.rich-editor__tool--active]="isItalic()" (click)="toggleItalic()" title="Italic">
        <svg viewBox="0 0 24 24" fill="none"><line x1="19" y1="4" x2="10" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="20" x2="5" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="4" x2="9" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="rich-editor__toolbar-divider"></div>

    <div class="rich-editor__toolbar-group">
      <button type="button" class="rich-editor__tool" [disabled]="!canUndo()" (click)="undo()" title="Undo">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 7v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button type="button" class="rich-editor__tool" [disabled]="!canRedo()" (click)="redo()" title="Redo">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 7v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div #editorEl></div>
</div>
