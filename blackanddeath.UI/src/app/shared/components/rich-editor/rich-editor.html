<div class="rich-editor" [class.rich-editor--collapsed]="!showToolbar" [class.rich-editor--compact]="compact">
  <div class="rich-editor__toolbar" [class.rich-editor__toolbar--hidden]="!showToolbar">

    <!-- Inline formatting -->
    <div class="rich-editor__toolbar-group">
      <button type="button" class="rich-editor__tool" [class.rich-editor__tool--active]="isBold()" (click)="toggleBold()" title="Bold (Ctrl+B)">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 12H12.5C14.433 12 16 10.433 16 8.5C16 6.567 14.433 5 12.5 5H6V12ZM6 12H13.5C15.433 12 17 13.567 17 15.5C17 17.433 15.433 19 13.5 19H6V12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button type="button" class="rich-editor__tool rich-editor__tool--italic" [class.rich-editor__tool--active]="isItalic()" (click)="toggleItalic()" title="Italic (Ctrl+I)">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 5H14M10 19H14M12 5L10 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button type="button" class="rich-editor__tool rich-editor__tool--strike" [class.rich-editor__tool--active]="isStrike()" (click)="toggleStrike()" title="Strikethrough">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M8.5 7.5C8.5 6.12 9.62 5 11 5H13C14.66 5 16 6.34 16 8C16 9.66 14.66 11 13 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M15.5 16.5C15.5 17.88 14.38 19 13 19H11C9.34 19 8 17.66 8 16C8 14.34 9.34 13 11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="rich-editor__toolbar-divider"></div>

    @if (!compact) {
    <!-- Block formatting -->
    <div class="rich-editor__toolbar-group">
      <button type="button" class="rich-editor__tool" [class.rich-editor__tool--active]="isBulletList()" (click)="toggleBulletList()" title="Bullet list">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="4" cy="6" r="1.5" fill="currentColor"/>
          <circle cx="4" cy="12" r="1.5" fill="currentColor"/>
          <circle cx="4" cy="18" r="1.5" fill="currentColor"/>
          <path d="M8 6H20M8 12H20M8 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <button type="button" class="rich-editor__tool" [class.rich-editor__tool--active]="isOrderedList()" (click)="toggleOrderedList()" title="Numbered list">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 6H20M10 12H20M10 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <text x="2" y="8.5" font-size="6" font-weight="700" fill="currentColor" font-family="sans-serif">1.</text>
          <text x="2" y="14.5" font-size="6" font-weight="700" fill="currentColor" font-family="sans-serif">2.</text>
          <text x="2" y="20.5" font-size="6" font-weight="700" fill="currentColor" font-family="sans-serif">3.</text>
        </svg>
      </button>
      <button type="button" class="rich-editor__tool" [class.rich-editor__tool--active]="isBlockquote()" (click)="toggleBlockquote()" title="Blockquote">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 7H3.01" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="5" y="5" width="2" height="14" rx="1" fill="currentColor" opacity="0.4"/>
          <path d="M9 8H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 12H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 16H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="rich-editor__toolbar-divider"></div>
    }

    <!-- History -->
    <div class="rich-editor__toolbar-group">
      <button type="button" class="rich-editor__tool" [disabled]="!canUndo()" (click)="undo()" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 8H14C17.314 8 20 10.686 20 14C20 17.314 17.314 20 14 20H4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M8 4L4 8L8 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button type="button" class="rich-editor__tool" [disabled]="!canRedo()" (click)="redo()" title="Redo (Ctrl+Y)">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 8H10C6.686 8 4 10.686 4 14C4 17.314 6.686 20 10 20H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 4L20 8L16 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>

  <div #editorEl></div>
</div>
