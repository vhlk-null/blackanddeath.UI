<div class="section-container" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">
    @if (sectionTitle()) {
    <div class="section-header">
      @if (titleLink()) {
        <a class="section-title section-title--link" [routerLink]="titleLink()" [queryParams]="titleQueryParams()">
          {{ sectionTitle() }}
          <svg class="section-title__arrow" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      } @else {
        <h1 class="section-title">{{ sectionTitle() }}</h1>
      }
      <ng-content select="[sectionAction]"></ng-content>
    </div>
    }
    <div class="section-body">
        @if (tabs()) {
        <div class="section-tabs">
            <app-tabs [tabs]="tabs()!" [initialIndex]="initialTab()" (tabChange)="tabChange.emit($event)"></app-tabs>
        </div>
        }
        <div class="section-content-wrapper">
            @if (arrows() && hasOverflow()) {<button class="section-arrow section-arrow--prev" [class.section-arrow--visible]="hovered()" [class.section-arrow--disabled]="!canScrollLeft()" [disabled]="!canScrollLeft()" aria-label="Previous" (click)="scrollContent(-1)">&#8249;</button>}
            <div class="section-content" [class.section-content--scroll]="scroll()" [class.section-content--wrap]="!scroll()" [style.--columns]="columns()" [style.--mobile-columns]="mobileColumns()" #contentEl (scroll)="onScroll($event)">
                <ng-content></ng-content>
            </div>
            @if (arrows() && hasOverflow()) {<button class="section-arrow section-arrow--next" [class.section-arrow--visible]="hovered()" [class.section-arrow--disabled]="!canScrollRight()" [disabled]="!canScrollRight()" aria-label="Next" (click)="scrollContent(1)">&#8250;</button>}
        </div>
    </div>
    @if (arrows() && dotCount() > 1) {
    <div class="section-dots">
      @for (d of dots(); track $index) {
        <span class="section-dots__dot" [class.section-dots__dot--active]="activeDot() === $index"></span>
      }
    </div>
    }
</div>
