<div class="section-container">
    @if (sectionTitle()) {
    <h1 class="section-title">{{ sectionTitle() }}</h1>
    }
    <div class="section-body">
        @if (tabs()) {
        <div class="section-tabs">
            <app-tabs [tabs]="tabs()!" [initialIndex]="initialTab()" (tabChange)="tabChange.emit($event)"></app-tabs>
        </div>
        }
        <div class="section-content" [style.--columns]="columns()">
            <ng-content></ng-content>
        </div>
    </div>
</div>
